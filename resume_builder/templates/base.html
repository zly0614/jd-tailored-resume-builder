<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Jianli Creator{% endblock %}</title>
  <style>
    :root {
      --ink: #1f2933;
      --muted: #667784;
      --line: rgba(31, 41, 51, 0.12);
      --panel: rgba(255, 250, 244, 0.92);
      --accent: #0f766e;
      --accent-strong: #115e59;
      --warm: #c56a1a;
      --shadow: 0 18px 48px rgba(31, 41, 51, 0.12);
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.14), transparent 26%),
        radial-gradient(circle at top right, rgba(197, 106, 26, 0.12), transparent 24%),
        linear-gradient(180deg, #fbf6ef 0%, #f0e7db 100%);
      min-height: 100vh;
    }

    .shell {
      max-width: 1360px;
      margin: 0 auto;
      padding: 28px 18px 48px;
    }

    .hero, .panel, .card {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      background: linear-gradient(135deg, rgba(255, 253, 248, 0.96), rgba(242, 249, 248, 0.92));
      margin-bottom: 22px;
    }

    .eyebrow {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.1);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .hero p, .hint, .meta-note, .placeholder {
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
      margin: 0;
    }

    .panel {
      padding: 22px;
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: -0.02em;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      color: var(--accent-strong);
      font-size: 14px;
      font-weight: 700;
    }

    .step-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(15, 118, 110, 0.14);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .layout-2 {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 22px;
    }

    .fields-2, .fields-3 {
      display: grid;
      gap: 12px;
    }

    .fields-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .fields-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }

    label {
      display: block;
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 700;
      color: #31424e;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid rgba(31, 41, 51, 0.14);
      border-radius: 16px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.88);
      color: var(--ink);
      font: inherit;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.65;
    }

    .textarea-tall { min-height: 240px; }
    .textarea-xl { min-height: 320px; font-family: Consolas, "Courier New", monospace; font-size: 13px; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    button, .button-link {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
    }

    .secondary {
      background: rgba(197, 106, 26, 0.12);
      color: #8a510a;
    }

    .ghost {
      background: rgba(31, 41, 51, 0.07);
      color: #31424e;
    }

    .danger {
      background: rgba(180, 35, 24, 0.1);
      color: var(--danger);
    }

    .status, .error {
      padding: 14px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .status {
      background: rgba(15, 118, 110, 0.1);
      color: var(--accent-strong);
    }

    .error {
      background: rgba(180, 35, 24, 0.1);
      color: var(--danger);
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .template-card {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.78);
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
      cursor: pointer;
    }

    .template-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(15, 118, 110, 0.08);
      border-color: rgba(15, 118, 110, 0.26);
    }

    .template-card.active {
      border-color: rgba(15, 118, 110, 0.48);
      background: linear-gradient(180deg, rgba(240, 253, 250, 0.88), rgba(255, 255, 255, 0.9));
    }

    .template-card input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .template-preview {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      display: block;
      background: #f2ede6;
      border-bottom: 1px solid var(--line);
    }

    .template-copy {
      padding: 16px 18px 18px;
    }

    .template-chip {
      display: inline-flex;
      margin-bottom: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(197, 106, 26, 0.12);
      color: #9a5a04;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .builder-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .builder-item, .card {
      padding: 16px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    .progress {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .progress-step {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(31, 41, 51, 0.07);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .progress-step.active {
      background: rgba(15, 118, 110, 0.12);
      color: var(--accent-strong);
    }

    pre {
      margin: 0;
      padding: 18px;
      border-radius: 20px;
      background: #142228;
      color: #ecf6f5;
      min-height: 240px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.68;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .meta-card {
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
    }

    .meta-card span {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    @media (max-width: 980px) {
      .layout-2, .fields-2, .fields-3, .meta-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="eyebrow">Resume Knowledge Base</div>
      {% block hero %}{% endblock %}
    </section>
    {% block body %}{% endblock %}
  </div>
</body>
</html>
